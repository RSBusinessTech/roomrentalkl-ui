<section class="living-section" *ngIf="areaGuide">
  <!-- LEFT -->
  <div class="living-content reveal delay-1">
    <h2>
      {{ areaGuide.title }}
    </h2>

    <p class="intro">
      {{ areaGuide.description }}
    </p>

    <ul class="highlights">
      <li *ngFor="let item of areaGuide.highlights">
        <i class="fas fa-check-circle"></i>
        <span>{{ item }}</span>
      </li>
    </ul>

    <a
      class="explore-btn reveal delay-2"
      [href]="areaGuide.buttonLink || 'javascript:void(0)'">
      {{ areaGuide.buttonText }}
    </a>
  </div>

  <!-- RIGHT -->
  <div class="features-grid">
    <div
      class="feature-card reveal delay-1"
      *ngFor="let feature of areaGuide.features">

      <div class="icon">
        <i [class]="feature.icon"></i>
      </div>

      <h3>
        {{ feature.title }}
      </h3>

      <p>
        {{ feature.description }}
      </p>
    </div>
  </div>

</section>

 <!-- SEO CONTENT -->
<div class="seo-grid reveal delay-4">
  <!-- Popular Residences -->
  <div class="seo-card">
    <h3>Popular Residences</h3>
    <ul>
      <li *ngFor="let item of areaGuide.popularResidences">
        {{ item }}
      </li>
    </ul>
  </div>

  <!-- Nearby Landmarks -->
  <div class="seo-card">
    <h3>Nearby Landmarks</h3>
    <ul>
      <li *ngFor="let item of areaGuide.nearbyLandmarks">
        {{ item }}
      </li>
    </ul>
  </div>

  <!-- Universities -->
  <div class="seo-card">
    <h3>Nearby Universities</h3>
    <ul>
      <li *ngFor="let item of areaGuide.nearbyUniversities">
        {{ item }}
      </li>
    </ul>
  </div>

  <!-- Employers -->
  <div class="seo-card">
    <h3>Major Employers</h3>
    <ul>
      <li *ngFor="let item of areaGuide.majorEmployers">
        {{ item }}
      </li>
    </ul>
  </div>
</div>
